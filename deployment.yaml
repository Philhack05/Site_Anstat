apiVersion: apps/v1
kind: Deployment
metadata:
  name: cae-webapp-deployment
  namespace: production
  labels:
    app: cae-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cae-webapp
  template:
    metadata:
      labels:
        app: cae-webapp
    spec:
      containers:
      - name: cae-webapp
        image: harbor.cae.anstat/library/cae-webapp:latest
        ports:
        - containerPort: 80
        env:
        # Variables lues par CodeIgniter 4
        - name: app.baseURL
          value: "http://cae-webapp.cae.anstat/"
        - name: database.default.hostname
          value: "mysql-service"
        - name: database.default.database
          value: "db_rgee_entreprise"
        - name: database.default.username
          value: "root"
        - name: database.default.password
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: password